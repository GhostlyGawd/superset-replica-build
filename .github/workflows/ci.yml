name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # The PTY layer (node-pty/ConPTY) must run under Node, not Bun (ADR-0007):
      # under Bun on Windows its ConPTY pipe throws ERR_SOCKET_CLOSED. The PTY
      # integration test shells out to this Node for the real spawn/kill round-trip.
      - name: Setup Node (engine PTY runtime)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (biome)
        run: bun run lint

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Build (turbo)
        run: bun run build

      - name: Test (bun test)
        run: bun run test
