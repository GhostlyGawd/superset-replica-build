name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Electron is a desktop devDependency. CI only typechecks/builds + Playwright-tests
# the renderer headlessly and never launches the Electron GUI (that is verified
# locally + packaged in Phase 5), so skip the ~150MB binary download on every runner.
# (Bun also blocks untrusted postinstalls by default; this makes the intent explicit
# and covers any runner where the script would otherwise run.)
env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # The PTY layer (node-pty/ConPTY) must run under Node, not Bun (ADR-0007):
      # under Bun on Windows its ConPTY pipe throws ERR_SOCKET_CLOSED. The PTY
      # integration test shells out to this Node for the real spawn/kill round-trip.
      - name: Setup Node (engine PTY runtime)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (biome)
        run: bun run lint

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Build (turbo)
        run: bun run build

      - name: Test (bun test)
        run: bun run test

  # Real end-to-end of the desktop renderer against a REAL seeded host (P05 terminal,
  # P06 diff, P08 nav/open-external, P09 shortcuts/settings). The Playwright webServer
  # builds the renderer + serves it via `vite preview`; globalSetup boots a genuine
  # Grove host (node-pty under Node), so this gates the actual user journey (§6.2).
  # Run on ubuntu only — cheapest runner and the journey is OS-portable; Windows
  # desktop launch is verified locally + packaged in Phase 5. Driven via Node
  # (Playwright + Bun is unreliable; see evidence/phase-1).
  e2e:
    name: e2e (desktop, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node (host PTY runtime + Playwright driver)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium (+ system deps)
        working-directory: apps/desktop
        run: bunx playwright install --with-deps chromium

      - name: Desktop e2e (Playwright vs real host)
        working-directory: apps/desktop
        run: node ./node_modules/@playwright/test/cli.js test

      # Cross-platform perf re-measure (§6.4, ADR-0019): run the EXISTING report-only
      # perf harness on Linux against the same real seeded host (reusing the chromium
      # installed above). Linux's bash has far lighter per-command cost than interactive
      # Windows PowerShell, so this is the cross-platform datapoint that retires the
      # Phase-3 Windows terminal-stream p95 tail. The spec makes NO budget asserts — it
      # prints `PERF_RESULTS {json}` to the log and writes grove-perf-results.json; it
      # never gates the build red on slow numbers.
      - name: Desktop perf re-measure (report-only, Linux numbers)
        if: always()
        # Report-only (ADR-0019): the perf harness makes no budget asserts and must
        # NEVER turn the build red on slow numbers (or a slow-host measurement timeout).
        # continue-on-error keeps the step's result visible + the log/artifact intact
        # while guaranteeing it can't fail the job.
        continue-on-error: true
        working-directory: apps/desktop
        env:
          GROVE_E2E_MEASURE: "1"
        run: node ./node_modules/@playwright/test/cli.js test _perf.spec.ts --reporter=line

      - name: Upload perf results (Linux §6.4 numbers)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grove-perf-results-linux
          path: apps/desktop/grove-perf-results.json
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/desktop/playwright-report
          retention-days: 7

  # Real end-to-end of the mobile PWA against a REAL seeded host (P12): pairing
  # (QR single-use-code → bearer in IndexedDB), read journeys (workspace detail,
  # agents, diff), the touch terminal over the /terminal WS, real agent dispatch,
  # and the offline service worker + push opt-in — all at a phone viewport. The
  # Playwright webServer builds the PWA + serves it; globalSetup boots a genuine
  # Grove host. localhost is a secure context so the SW/install/push surfaces work.
  # ubuntu only (cheapest; journey is OS-portable); driven via Node.
  e2e-mobile:
    name: e2e (mobile, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node (host PTY runtime + Playwright driver)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium (+ system deps)
        working-directory: apps/mobile
        run: bunx playwright install --with-deps chromium

      - name: Mobile PWA e2e (Playwright vs real host)
        working-directory: apps/mobile
        run: node ./node_modules/@playwright/test/cli.js test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mobile
          path: apps/mobile/playwright-report
          retention-days: 7

  # Render + a11y gate for the Grove launch site (apps/site, ADR-0021). The site is
  # a prerendered static page that talks to NOTHING (no host/globalSetup, unlike the
  # desktop/mobile e2e jobs): the Playwright webServer runs the package build (client
  # + SSR + prerender stitch) and serves `dist` via `vite preview`. The suite asserts
  # the cockpit shell + every section's real copy at a desktop AND a Pixel-5 phone
  # viewport, and runs axe-core over the page + open command palette with a hard gate
  # of 0 critical / 0 serious. ubuntu only (cheapest; the page is OS-portable); the
  # `verify` matrix already builds apps/site on all 3 OSes via turbo. Driven via Node
  # (Playwright + bun is unreliable; see evidence/phase-1).
  site:
    name: site (apps/site, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node (Playwright driver)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium (+ system deps)
        working-directory: apps/site
        run: bunx playwright install --with-deps chromium

      - name: Build the launch site (prerender to static HTML)
        run: bun run --filter @swarm/site build

      - name: Render + a11y (Playwright vs prerendered dist)
        working-directory: apps/site
        run: node ./node_modules/@playwright/test/cli.js test

      - name: Upload site screenshots (render evidence)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grove-site-screenshots
          path: evidence/site
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-site
          path: apps/site/playwright-report
          retention-days: 7

  # Validate the W4 electron-builder packaging config COLD on all 3 OSes (ADR-0016).
  # UNLIKE every other job, this one needs the real Electron binary and runs
  # `electron-builder --dir` — the UNPACKED app tree, NO installer, NO GUI launch — so
  # the packaging config can't silently rot. A GUI launch is NOT asserted here (that +
  # the full NSIS/dmg/AppImage installers are local W6 evidence under evidence/phase-5/);
  # `--dir` is all that is honestly verifiable headlessly. The other jobs (verify/e2e/
  # e2e-mobile) keep the workflow-level ELECTRON_SKIP_BINARY_DOWNLOAD: "1" and never
  # download Electron — only this job does.
  package:
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    # Override the workflow-level skip for THIS job only. (Electron v42's installer +
    # @electron/get no longer read this var, and bun blocks Electron's untrusted
    # postinstall regardless — so the binary is actually fetched by the explicit prime
    # step below; this override just keeps the intent unambiguous and neutralizes the
    # global "1" for any electron-builder code path that still consults it.)
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node (electron-builder toolchain)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Cache the Electron binary (@electron/get) + electron-builder's downloaded tools,
      # keyed on the lockfile, so repeat runs don't re-pull ~150–250 MB on the metered
      # Windows/macOS runners. Per-OS key (the binaries are platform-specific).
      - name: Cache Electron + electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Bun does not run Electron's (untrusted) postinstall, so node_modules/electron has
      # no binary after install. Fetch it explicitly via Electron's own installer (which
      # downloads through @electron/get into the cache above + populates dist/), so
      # electron-builder finds a real Electron. ELECTRON_SKIP_BINARY_DOWNLOAD="" here is
      # the unambiguous "do not skip" value for any installer version that DOES check it.
      - name: Prime the Electron binary
        working-directory: apps/desktop
        run: node -e "require('node:child_process').execFileSync(process.execPath,[require.resolve('electron/install.js')],{stdio:'inherit'})"
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ""

      - name: Build (turbo) — emits apps/desktop/dist (main.js + preload.cjs + renderer)
        run: bun run build

      - name: Package unpacked app (electron-builder --dir — no installer, no GUI launch)
        run: bun run --filter @swarm/desktop package:dir

      - name: Assert the unpacked Grove app exists (app tree + bundled main/renderer in asar)
        working-directory: apps/desktop
        run: node ./scripts/assert-unpacked.mjs

      - name: Upload the unpacked app (short retention)
        uses: actions/upload-artifact@v4
        with:
          name: grove-unpacked-${{ matrix.os }}
          path: |
            apps/desktop/release/*-unpacked
            apps/desktop/release/mac*
          retention-days: 2
          if-no-files-found: error
